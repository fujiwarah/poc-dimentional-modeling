services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - ./postgres/init/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  bigquery-emulator:
    image: ghcr.io/goccy/bigquery-emulator:latest
    platform: linux/amd64
    ports:
      - "9050:9050"
      - "9060:9060"
    command: >
      --project=poc-project
      --data-from-yaml=/data/dataset.yml
    volumes:
      - ./bigquery/dataset.yml:/data/dataset.yml
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9050'"]
      interval: 5s
      timeout: 5s
      retries: 5

